spring.application.name=krisefikser

# Use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Don’t let Hibernate try to generate or alter schema
spring.jpa.hibernate.ddl-auto=none

# Disable Spring Boot's schema.sql / data.sql initialization
spring.sql.init.mode=never

# Flyway: enable migrations and point at db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# (Optional) Enable H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# The key should be at least 256 bits long (32 bytes)
jwt.secret = super-duper-secure-and-long-secret-key-should-be-at-least-256-bit

# The expiration time in milliseconds (1 day = 86400000 ms)
jwt.expiration = 86400000


# The expiration time in milliseconds for the refresh token (7 days = 604800000 ms)
jwt.refreshExpiration = 604800000
# where the frontend reset form will live (only needed when you send password-reset links)
app.frontend.url=http://localhost:8080

