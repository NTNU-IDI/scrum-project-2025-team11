spring.application.name=krisefikser

# Use H2 in-memory database
spring.datasource.url=jdbc:h2:file:./data/krisefikser;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=passordhash123

# Don’t let Hibernate try to generate or alter schema
spring.jpa.hibernate.ddl-auto=none

# Disable Spring Boot's schema.sql / data.sql initialization
spring.sql.init.mode=never

# Flyway: enable migrations and point at db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# (Optional) Enable H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# The key should be at least 256 bits long (32 bytes)
jwt.secret = super-duper-secure-and-long-secret-key-should-be-at-least-256-bit

# The expiration time in milliseconds (15 minutes = 900000 ms)
jwt.expiration = 900000


# The expiration time in milliseconds for the refresh token (1 hour = 3600000 ms)
jwt.refreshExpiration = 3600000
# where the frontend reset form will live (only needed when you send password-reset links)
app.frontend.url=http://localhost:8080

