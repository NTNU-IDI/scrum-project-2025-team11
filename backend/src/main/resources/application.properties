spring.application.name=krisefikser

# Use H2 in-memory database (MySQL mode helps if you keep backticks)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Don’t let Hibernate try to generate or alter schema
spring.jpa.hibernate.ddl-auto=none

# Disable Spring Boot's schema.sql / data.sql initialization
spring.sql.init.mode=never

# Flyway: enable migrations and point at db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# (Optional) Enable H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

