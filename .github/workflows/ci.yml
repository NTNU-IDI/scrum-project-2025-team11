name: CI pipeline

on:
  push:
    branches: [ main, dev, 124-pipeline ]
  pull_request:
    branches: [ main ]

jobs:
# ──────────────────────────────────────────────────────────────
# 1) BACK-END  (build & unit tests)                            │
# ──────────────────────────────────────────────────────────────
  backend:
    runs-on: [ self-hosted, ubuntu-arm64 ]
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven                          # speeds up next run

      - name: Debug backend dir
        run: |
          pwd
          ls -la .
          ls -la ../mvnw || true

      - name: Build & test
        run: ./mvnw -B verify                      # compile + tests

      - name: Package JAR
        run: mvn -B package -DskipTests

      - uses: actions/upload-artifact@v4        # hand jar to later jobs
        with:
          name: spring-jar
          path: backend/target/*.jar

# ──────────────────────────────────────────────────────────────
# 2) FRONT-END  (Vue lint, unit test, build)                   │
# ──────────────────────────────────────────────────────────────
  frontend:
    runs-on: [ self-hosted, ubuntu-arm64 ]
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint & unit tests
        run: npm run test:unit --if-present     # optional

      - name: Build production bundle
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: frontend/dist

