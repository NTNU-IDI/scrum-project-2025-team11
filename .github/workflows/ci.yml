name: CI pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
# ──────────────────────────────────────────────────────────────
# 1) BACK-END  (build & unit tests)                            │
# ──────────────────────────────────────────────────────────────
  backend:
    runs-on: [ self-hosted]
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & test
        run: mvn -B verify

      - name: Package JAR
        run: mvn -B package -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: spring-jar
          path: target/*.jar

# ──────────────────────────────────────────────────────────────
# 2) FRONT-END  (Vue lint, unit test, build)                   │
# ──────────────────────────────────────────────────────────────
  frontend:
    runs-on: [ self-hosted]
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint & unit tests
        run: npm run test:unit --if-present     # optional

#      - name: Build production bundle
#        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: frontend/dist

